[package]
name = "vellum"
version = "0.1.0"
edition = "2021"
description = "A fast terminal viewer for files that are awkward in a browser: markdown, spreadsheets, PDF, images, video and docx."
license = "MIT"
readme = "README.md"
repository = "https://github.com/john-athan/vellum"
keywords = ["tui", "viewer", "markdown", "pdf", "spreadsheet"]
categories = ["command-line-utilities", "visualization"]

[profile.release]
opt-level = 3
lto = "thin"

[dependencies]
pulldown-cmark = "0.12"
ratatui = "0.30"
crossterm = "0.29"
calamine = "0.26"
ratatui-image = { version = "11", default-features = false, features = ["crossterm", "image-defaults"] }
image = "0.25"
zip = "2"
quick-xml = "0.36"

[[bin]]
name = "vellum"
path = "src/main.rs"
