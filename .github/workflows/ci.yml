name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy -- -D warnings
      - name: Test
        run: cargo test
      - name: Build (release)
        run: cargo build --release
      # Guard the lean build: the `data` feature (DuckDB, ADR 0016) is default-on,
      # so also prove the crate still compiles and its non-DuckDB tests pass with
      # it off — this path has silently broken before.
      - name: Build & test without default features (lean)
        run: |
          cargo build --no-default-features
          cargo test --no-default-features

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
